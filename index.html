<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Dashboard — Marvin</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-180.png">
<link rel="icon" href="favicon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Dashboard">
<meta name="theme-color" content="#0b0d10">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<style>
  :root{
    --bg:#0b0d10; --surface:#14171c; --surface2:#1b1f26; --surface3:#20242c;
    --border:#262b33; --text:#e8eaed; --text-dim:#8a919c;
    --accent:#34d399; --accent-dim:#1d5c46;
    --biz:#5b8def; --biz-dim:#25355c;
    --danger:#f97066; --danger-dim:#5c2a26;
    --warn:#f5c451; --radius:14px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--bg); color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Inter","SF Pro Text",sans-serif;
    -webkit-font-smoothing:antialiased; padding-bottom:90px;
  }
  input, select, textarea { font-size:16px !important; }
  .num{font-variant-numeric:tabular-nums;}
  h1,h2,h3{margin:0;font-weight:700;letter-spacing:-0.01em;}
  header{
    position:sticky;top:0;z-index:20;
    background:rgba(11,13,16,0.94); backdrop-filter:blur(10px);
    border-bottom:1px solid var(--border); padding:14px 16px 10px;
  }
  header .title{font-size:20px;}
  header .sub{color:var(--text-dim);font-size:12.5px;margin-top:2px;}
  nav{display:flex;gap:6px;overflow-x:auto;padding:10px 12px 12px;scrollbar-width:none;}
  nav::-webkit-scrollbar{display:none;}
  nav button{
    flex:0 0 auto;background:var(--surface);color:var(--text-dim);
    border:1px solid var(--border);padding:8px 14px;border-radius:999px;
    font-size:13.5px!important;font-weight:600;white-space:nowrap;
  }
  nav button.active{background:var(--text);color:#0b0d10;border-color:var(--text);}
  main{padding:14px 14px 20px;max-width:640px;margin:0 auto;}
  section.tab{display:none;}
  section.tab.active{display:block;}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:12px;}
  .card-title{
    font-size:12px;text-transform:uppercase;letter-spacing:.06em;color:var(--text-dim);
    margin-bottom:10px;display:flex;justify-content:space-between;align-items:center;gap:8px;flex-wrap:wrap;
  }
  .big{font-size:26px;font-weight:800;letter-spacing:-0.02em;}
  .big.accent{color:var(--accent);}
  .big.biz{color:var(--biz);}
  .big.danger{color:var(--danger);}
  .row{display:flex;justify-content:space-between;align-items:center;gap:10px;}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  .grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
  .mini-label{font-size:11.5px;color:var(--text-dim);margin-bottom:4px;}
  .mini-value{font-size:16px;font-weight:700;}
  .year-picker,.month-picker{
    display:flex;align-items:center;justify-content:space-between;
    background:var(--surface2);border:1px solid var(--border);border-radius:999px;
    padding:6px 6px 6px 16px;margin-bottom:10px;
  }
  .year-picker .label,.month-picker .label{font-weight:700;font-size:15px;}
  .year-picker .arrows,.month-picker .arrows{display:flex;gap:4px;}
  .year-picker button,.month-picker button{
    background:var(--surface);border:1px solid var(--border);color:var(--text);
    width:32px;height:32px;border-radius:50%;font-size:16px!important;
  }
  .vue-toggle{display:flex;background:var(--surface2);border:1px solid var(--border);border-radius:999px;padding:3px;margin-bottom:14px;}
  .vue-toggle button{flex:1;background:none;border:none;color:var(--text-dim);padding:7px 0;border-radius:999px;font-size:12px!important;font-weight:700;}
  .vue-toggle button.active{background:var(--text);color:#0b0d10;}
  table{width:100%;border-collapse:collapse;font-size:13.5px;}
  th{
    text-align:left;color:var(--text-dim);font-weight:600;font-size:10.5px;
    text-transform:uppercase;letter-spacing:.04em;padding:4px 5px;border-bottom:1px solid var(--border);
  }
  td{padding:7px 5px;border-bottom:1px solid var(--border);vertical-align:middle;}
  td.num,th.num{text-align:right;}
  tr:last-child td{border-bottom:none;}
  .table-scroll{overflow-x:auto;}
  input.cell,select.cell{
    width:100%;background:transparent;border:none;color:var(--text);
    text-align:right;font-variant-numeric:tabular-nums;padding:2px;
  }
  input.cell.txt,select.cell.txt{text-align:left;}
  input.cell:focus,select.cell:focus{outline:1px solid var(--accent);border-radius:4px;}
  input[type=date].cell{text-align:left;color:var(--text-dim);}
  input[type=checkbox]{width:18px;height:18px;accent-color:var(--accent);}
  input[type=color]{width:44px;height:32px;border:1px solid var(--border);border-radius:8px;background:none;padding:2px;}
  .del-btn{background:none;border:none;color:var(--danger);font-size:15px;padding:2px 5px;}
  .ship-btn{background:var(--accent-dim);color:var(--accent);border:none;border-radius:7px;padding:6px 10px;font-size:12px!important;font-weight:700;white-space:nowrap;}
  .add-row-btn{
    width:100%;margin-top:10px;background:var(--surface2);border:1px dashed var(--border);
    color:var(--text-dim);padding:9px;border-radius:10px;font-size:13.5px!important;font-weight:600;
  }
  .chart-wrap{position:relative;height:170px;margin-top:4px;}
  .chart-wrap.tall{height:210px;}
  .pill{display:inline-block;padding:2px 9px;border-radius:999px;font-size:11px;font-weight:700;}
  .pill.pos{background:var(--accent-dim);color:var(--accent);}
  .pill.neg{background:var(--danger-dim);color:var(--danger);}
  .pill.warn{background:#4a3a13;color:var(--warn);}
  .biz-header{display:flex;align-items:center;gap:8px;margin-bottom:2px;}
  .dot{width:9px;height:9px;border-radius:50%;flex:0 0 auto;}
  footer.note{color:var(--text-dim);font-size:11.5px;text-align:center;padding:10px 20px 0;line-height:1.6;}
  .empty{color:var(--text-dim);font-size:13px;text-align:center;padding:14px 0;}
  .link-btn{color:var(--text-dim);font-size:12px!important;text-decoration:underline;background:none;border:none;}
  .inline-form{display:flex;gap:6px;align-items:center;margin-bottom:10px;flex-wrap:wrap;}
  .inline-form select,.inline-form input{
    background:var(--surface2);border:1px solid var(--border);color:var(--text);
    border-radius:8px;padding:8px 8px;
  }
  .inline-form select{flex:1 1 40%;min-width:110px;}
  .inline-form input[type=number]{flex:1 1 80px;width:80px;}
  .inline-form input[type=text]{flex:1 1 40%;min-width:100px;}
  .inline-form input[type=date]{flex:1 1 120px;}
  .inline-form button{background:var(--accent);color:#062318;border:none;border-radius:8px;padding:8px 12px;font-size:13px!important;font-weight:700;}
  .cat-manager{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px;margin-top:8px;}
  .cat-chip{display:inline-flex;align-items:center;gap:5px;background:var(--surface3);border-radius:999px;padding:4px 6px 4px 10px;font-size:12px;margin:3px 4px 3px 0;}
  .cat-chip button{background:none;border:none;color:var(--text-dim);font-size:13px;padding:0 3px;}
  .cat-chip input[type=text]{width:84px;background:transparent;border:none;border-bottom:1px solid var(--border);color:var(--text);text-align:left;}
  .cat-chip input[type=number]{width:48px;background:transparent;border:none;border-bottom:1px solid var(--border);color:var(--text);text-align:right;}
  .subtle-table{font-size:12.5px;}
  .subtle-table td{padding:5px;}
  .bar-mini{height:5px;border-radius:3px;background:var(--surface3);overflow:hidden;margin-top:3px;}
  .bar-mini > div{height:100%;}
  .late{color:var(--danger)!important;font-weight:700;}
  .soon{color:var(--warn)!important;font-weight:700;}
  details summary{cursor:pointer;color:var(--text-dim);font-size:12.5px;font-weight:600;list-style:none;}
  details summary::-webkit-details-marker{display:none;}
  details summary:before{content:'▸ ';}
  details[open] summary:before{content:'▾ ';}
  .footer-actions{display:flex;gap:14px;justify-content:center;margin-top:8px;flex-wrap:wrap;}
  .banner{
    background:#4a3a13;border:1px solid #6b551d;color:var(--warn);border-radius:12px;
    padding:12px 14px;font-size:13px;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap;
  }
  .banner button{background:var(--warn);color:#3a2d0c;border:none;border-radius:8px;padding:6px 10px;font-size:12px!important;font-weight:700;white-space:nowrap;}
  .budget-bar{height:6px;border-radius:3px;background:var(--surface3);overflow:hidden;margin-top:5px;}
  .budget-bar>div{height:100%;background:var(--accent);}
  .budget-bar.over>div{background:var(--danger);}

  .filter-chips{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap;}
  .filter-chips button{background:var(--surface2);border:1px solid var(--border);color:var(--text-dim);padding:6px 12px;border-radius:999px;font-size:12.5px!important;font-weight:600;}
  .filter-chips button.active{background:var(--text);color:#0b0d10;border-color:var(--text);}
  .cmd-row{
    background:var(--surface2);border:1px solid var(--border);border-left-width:5px;border-radius:10px;
    padding:10px 10px 10px 8px;margin-bottom:8px;touch-action:pan-y;
  }
  .cmd-row.dragging{opacity:0.5;}
  .cmd-row-top{display:flex;align-items:center;gap:6px;margin-bottom:6px;flex-wrap:wrap;}
  .drag-handle{cursor:grab;color:var(--text-dim);font-size:18px;padding:2px 6px;touch-action:none;}
  .biz-badge{font-size:10px;font-weight:700;padding:2px 7px;border-radius:999px;color:#0b0d10;white-space:nowrap;}
  .cmd-numero{background:var(--surface3);border:1px solid var(--border);border-radius:6px;padding:5px 7px;font-weight:700;color:var(--text);width:70px;flex:0 0 auto;}
  .cmd-article{width:100%;background:var(--surface3);border:1px solid var(--border);border-radius:6px;padding:6px 8px;color:var(--text);margin-bottom:6px;}
  .cmd-dates{display:flex;gap:8px;margin-bottom:6px;flex-wrap:wrap;}
  .cmd-dates label{font-size:10.5px;color:var(--text-dim);flex:1 1 45%;}
  .cmd-dates input,.cmd-dates select{width:100%;background:var(--surface3);border:1px solid var(--border);border-radius:6px;padding:5px 6px;color:var(--text);margin-top:2px;}
  .cmd-checks{display:flex;gap:16px;margin-bottom:6px;flex-wrap:wrap;align-items:center;}
  .cmd-checks label{font-size:12px;color:var(--text-dim);display:flex;align-items:center;gap:5px;}
  .color-dots{display:flex;gap:5px;margin-left:auto;}
  .color-dots span{width:16px;height:16px;border-radius:50%;display:inline-block;border:2px solid transparent;}
  .color-dots span.selected{border-color:var(--text);}
  .cmd-actions{display:flex;gap:6px;margin-left:auto;}
  .day-drop{min-height:30px;}
</style>
</head>
<body>

<header>
  <div class="title">💰 Dashboard</div>
  <div class="sub">Business · Placements · Perso — tout lié</div>
</header>

<nav id="nav"></nav>

<main>
  <section class="tab active" id="tab-recap"></section>
  <section class="tab" id="tab-biz"></section>
  <section class="tab" id="tab-commandes"></section>
  <section class="tab" id="tab-transport"></section>
  <section class="tab" id="tab-placement"></section>
  <section class="tab" id="tab-perso"></section>
</main>

<footer class="note">
  Les données sont enregistrées uniquement sur cet appareil (localStorage).
  <div style="margin-top:4px;">Build v11 — <span id="last-save-time"></span></div>
  <div class="footer-actions">
    <button class="link-btn" onclick="exportDataFile()">⭳ Exporter (fichier)</button>
    <button class="link-btn" onclick="exportDataText()">⭳ Exporter (texte)</button>
    <button class="link-btn" onclick="document.getElementById('import-file').click()">⭱ Importer un fichier</button>
    <button class="link-btn" onclick="importFromTextPrompt()">⭱ Importer depuis texte</button>
    <button class="link-btn" onclick="resetAll()">Réinitialiser</button>
  </div>
  <input type="file" id="import-file" accept="application/json" style="display:none">
</footer>

<script>
const MONTHS = ['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'];
const JOURS = ['Lundi','Mardi','Mercredi','Jeudi','Vendredi','Samedi','Dimanche'];
const STORAGE_KEY = 'marvin-dashboard-v5';
const REAL_MONTH = new Date().getMonth();
const REAL_YEAR = new Date().getFullYear();
const COLORS6 = [
  {id:'blue', hex:'#5b8def'}, {id:'yellow', hex:'#f5c451'}, {id:'orange', hex:'#fb923c'},
  {id:'red', hex:'#f97066'}, {id:'green', hex:'#34d399'}, {id:'purple', hex:'#c084fc'}
];
function colorHex(id){ const c = COLORS6.find(c=>c.id===id); return c ? c.hex : '#3a4048'; }

function uid(){ return Math.random().toString(36).slice(2,9); }
function fmt(n){ n=Number(n)||0; return n.toLocaleString('fr-FR',{style:'currency',currency:'EUR',maximumFractionDigits:0}); }
function parseNum(v){
  if(v===null || v===undefined) return 0;
  const s = String(v).trim().replace(/\s/g,'').replace(',', '.');
  const n = parseFloat(s);
  return isNaN(n) ? 0 : n;
}
function fmt2(n){ n=Number(n)||0; return n.toLocaleString('fr-FR',{style:'currency',currency:'EUR',maximumFractionDigits:2}); }
function pctStr(n){ n=Number(n)||0; return (n>=0?'+':'')+n.toFixed(1)+'%'; }
function todayISO(){ return new Date().toISOString().slice(0,10); }
function quarterOfMonth(m){ return Math.floor(m/3); }
function quarterMonths(q){ return [q*3, q*3+1, q*3+2]; }
function stepBack(y,m){ return m===0 ? {year:y-1, month:11} : {year:y, month:m-1}; }
function beforeYM(y1,m1,y2,m2){ return y1<y2 || (y1===y2 && m1<m2); }
function monthYearLabel(y,m){ return MONTHS[m]+' '+y; }

function defaultBiz(label,color,cats){
  return { label, color, categories: cats, years: {} };
}
function defaultState(){
  return {
    currentMonth: new Date().getMonth(),
    currentYear: new Date().getFullYear(),
    vue: 'mois',
    objectif: 1000000,
    lastExportAt: null,
    theme: { accent: '#34d399' },
    businesses: {
      woodind: defaultBiz('WoodInd','#5b8def', ['GEODIS','GEDIMAT','AMAZON','Toutemballe/Makant','GOOGLE','Shopify/Etsy','Action/Divers']),
      fabrique: defaultBiz('La Fabrique Du Meuble','#c084fc', ['Matières premières','Outillage','Livraison','Divers'])
    },
    commandes: [],
    transport: { tva: 20, entries: [] },
    placement: {
      lines: [
        {id:uid(), name:'Livret A', type:'cash'},
        {id:uid(), name:'LEP', type:'cash'},
        {id:uid(), name:'Qonto', type:'cash'},
        {id:uid(), name:'Liquide', type:'cash'},
        {id:uid(), name:'BTC', type:'asset', unit:'BTC'},
        {id:uid(), name:'PAXG / Or', type:'asset', unit:'oz'}
      ],
      years: {},
      transactions: []
    },
    perso: {
      categories: [
        {name:'Loyer', type:'fixe'}, {name:'Internet', type:'fixe'}, {name:'Téléphone', type:'fixe'},
        {name:'Assurance voiture', type:'fixe'}, {name:'Assurance maison', type:'fixe'},
        {name:'Électricité', type:'fixe'}, {name:'Eau', type:'fixe'}, {name:'Abonnements', type:'fixe'},
        {name:'Fast food', type:'plus'}, {name:'Restaurant', type:'plus'}, {name:'Gazole', type:'plus'},
        {name:'Achat maison', type:'plus'}, {name:'Emeline', type:'plus', cap:150}, {name:'Marvin', type:'plus', cap:150}
      ],
      years: {}
    }
  };
}

let state = load();
function migrateToMultiYear(){
  const y = REAL_YEAR;
  ['woodind','fabrique'].forEach(bizKey=>{
    const biz = state.businesses[bizKey];
    if(biz && Array.isArray(biz.months)){
      biz.years = biz.years || {};
      biz.years[y] = { months: biz.months };
      delete biz.months;
    }
    if(biz && !biz.years) biz.years = {};
  });
  if(state.placement){
    if(Array.isArray(state.placement.months)){
      state.placement.years = state.placement.years || {};
      state.placement.years[y] = { months: state.placement.months };
      delete state.placement.months;
    }
    if(!state.placement.years) state.placement.years = {};
    if(!state.placement.transactions) state.placement.transactions = [];
    state.placement.transactions.forEach(t=>{ if(t.annee===undefined) t.annee = y; });
  }
  if(state.perso){
    if(Array.isArray(state.perso.months)){
      state.perso.years = state.perso.years || {};
      state.perso.years[y] = { months: state.perso.months };
      delete state.perso.months;
    }
    if(!state.perso.years) state.perso.years = {};
  }
  if(state.transport && state.transport.entries){
    state.transport.entries.forEach(e=>{ if(e.annee===undefined) e.annee = y; });
  }
  if(state.currentYear===undefined) state.currentYear = y;
  if(state.lastExportAt===undefined) state.lastExportAt = null;
  save();
}
function mergeWithDefaults(parsed){
  const def = defaultState();
  return Object.assign(def, parsed, {
    businesses: Object.assign(def.businesses, parsed.businesses),
    placement: Object.assign(def.placement, parsed.placement),
    perso: Object.assign(def.perso, parsed.perso),
    transport: Object.assign(def.transport, parsed.transport)
  });
}
function load(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(!raw) return defaultState();
    return mergeWithDefaults(JSON.parse(raw));
  }catch(e){ return defaultState(); }
}
function themeAccent(){ return (state.theme && state.theme.accent) || '#34d399'; }
function hexToRgba(hex, alpha){
  const h = (hex||'#34d399').replace('#','');
  const r = parseInt(h.substring(0,2),16)||52, g=parseInt(h.substring(2,4),16)||211, b=parseInt(h.substring(4,6),16)||153;
  return `rgba(${r},${g},${b},${alpha})`;
}
function applyTheme(){
  document.documentElement.style.setProperty('--accent', themeAccent());
  document.documentElement.style.setProperty('--accent-dim', hexToRgba(themeAccent(), 0.18));
}
function save(){
  if(state.placement) purgeUntouchedPlacementCache();
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  const el = document.getElementById('last-save-time');
  if(el) el.textContent = 'dernière sauvegarde ' + new Date().toLocaleTimeString('fr-FR');
}
function purgeUntouchedPlacementCache(){
  // Untouched month records are just a derived cache (carried forward from the
  // nearest touched month). If a new line gets added to the touched source AFTER
  // an untouched month was already computed and cached, that cache goes stale —
  // it still exists with a matching sourceKey, so the reuse-as-is optimization
  // would keep returning it forever with the new line missing/zeroed. Since these
  // records are never authoritative data, it's always safe to wipe them; they get
  // rebuilt correctly (and cheaply) the next time they're read.
  Object.values(state.placement.years||{}).forEach(yr=>{
    for(let i=0;i<12;i++){
      if(yr.months[i] && !yr.months[i].touched) yr.months[i] = null;
    }
  });
}
migrateToMultiYear();
purgeUntouchedPlacementCache();

function applyImportedState(parsed){
  state = mergeWithDefaults(parsed);
  migrateToMultiYear();
  purgeUntouchedPlacementCache();
  save();
  renderAll();
}
function resetAll(){
  customConfirm('Supprimer toutes les données du dashboard ? Pense à exporter avant si besoin.', ()=>{
    localStorage.removeItem(STORAGE_KEY); state = defaultState(); renderAll();
  });
}

// ---------- modal helper ----------
function showModal(html){
  const overlay = document.createElement('div');
  overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:100;display:flex;align-items:center;justify-content:center;padding:20px;';
  overlay.innerHTML = `<div style="background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:16px;max-width:480px;width:100%;max-height:82vh;overflow:auto;">${html}</div>`;
  document.body.appendChild(overlay);
  overlay.addEventListener('click', (e)=>{ if(e.target===overlay) overlay.remove(); });
  return overlay;
}
function customConfirm(message, onYes){
  const overlay = showModal(`
    <div class="card-title">Confirmation</div>
    <div style="margin-bottom:14px;">${message}</div>
    <div style="display:flex;gap:8px;">
      <button class="ship-btn" id="cc-yes">Confirmer</button>
      <button class="link-btn" id="cc-no">Annuler</button>
    </div>
  `);
  overlay.querySelector('#cc-yes').onclick = ()=>{ overlay.remove(); onYes(); };
  overlay.querySelector('#cc-no').onclick = ()=> overlay.remove();
}
function customAlert(message){
  const overlay = showModal(`<div class="card-title">Info</div><div style="margin-bottom:14px;">${message}</div><button class="ship-btn" id="ca-ok">OK</button>`);
  overlay.querySelector('#ca-ok').onclick = ()=> overlay.remove();
}

// ---------- export / import ----------
function showToast(msg){
  const t = document.createElement('div');
  t.style.cssText = 'position:fixed;bottom:100px;left:50%;transform:translateX(-50%);background:var(--surface3);color:var(--text);border:1px solid var(--border);border-radius:10px;padding:12px 16px;font-size:13px;z-index:200;max-width:85%;text-align:center;box-shadow:0 4px 20px rgba(0,0,0,0.4);';
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(()=>{ t.style.transition='opacity 0.4s'; t.style.opacity='0'; setTimeout(()=>t.remove(), 400); }, 4500);
}
async function exportDataFile(){
  const dataStr = JSON.stringify(state, null, 2);
  const filename = 'dashboard-backup-'+todayISO()+'.json';

// ================= PLACEMENT HELPERS =================
function blankSnapshot(l){
  if(l.type==='cash') return {value:0, baselineValue:0};
  return {quantity:0, unitPrice:0, baselineQuantity:0, baselineUnitPrice:0, avgCost:0, priceConfirmed:false};
}
function ensurePlacementYear(year){
  if(!state.placement.years) state.placement.years = {};
  if(!state.placement.years[year]) state.placement.years[year] = { months: Array(12).fill(null) };
  return state.placement.years[year];
}
function findPriorLineSnapshot(lineId, year, m){
  let cursor = {year, month:m};
  for(let i=0;i<120;i++){
    cursor = stepBack(cursor.year, cursor.month);
    const yr = state.placement.years[cursor.year];
    if(yr && yr.months[cursor.month] && yr.months[cursor.month].snapshots[lineId]){
      return yr.months[cursor.month].snapshots[lineId];
    }
  }
  return null;
}
function ensurePlacementMonth(year, m){
  const yr = ensurePlacementYear(year);
  let rec = yr.months[m];
  if(rec && rec.touched){
    state.placement.lines.forEach(l=>{
      if(!rec.snapshots[l.id]){
        // A brand new line added while browsing an earlier or later month wouldn't
        // otherwise reach an already-confirmed month — carry forward the nearest
        // value that exists for this specific line instead of defaulting to 0.
        const prior = findPriorLineSnapshot(l.id, year, m);
        if(prior){
          rec.snapshots[l.id] = l.type==='cash'
            ? {value:prior.value, baselineValue:prior.value}
            : {quantity:prior.quantity, unitPrice:prior.unitPrice, baselineQuantity:prior.quantity, baselineUnitPrice:prior.unitPrice, avgCost:prior.avgCost||0, priceConfirmed:false};
        } else {
          rec.snapshots[l.id] = blankSnapshot(l);
        }
      }
    });
    return rec;
  }
  let prev = null, prevKey = null;
  let cursor = {year, month:m};
  for(let i=0;i<120;i++){
    cursor = stepBack(cursor.year, cursor.month);
    const yr2 = state.placement.years[cursor.year];
    if(yr2 && yr2.months[cursor.month] && yr2.months[cursor.month].touched){ prev = yr2.months[cursor.month]; prevKey = cursor.year+'-'+cursor.month; break; }
  }
  // If we already have an untouched record built from the SAME source, reuse it as-is.
  // Rebuilding on every call (even within a single render) used to silently discard
  // any in-progress edits, since other code paths (charts, totals) call this function
  // many times per render for the same month.
  if(rec && rec.sourceKey === prevKey){
    state.placement.lines.forEach(l=>{ if(!rec.snapshots[l.id]) rec.snapshots[l.id] = blankSnapshot(l); });
    return rec;
  }
  const snapshots = {};
  state.placement.lines.forEach(l=>{
    if(prev && prev.snapshots[l.id]){
      const p = prev.snapshots[l.id];
      if(l.type==='cash'){ snapshots[l.id] = {value:p.value, baselineValue:p.value}; }
      else { snapshots[l.id] = {quantity:p.quantity, unitPrice:p.unitPrice, baselineQuantity:p.quantity, baselineUnitPrice:p.unitPrice, avgCost:p.avgCost||0, priceConfirmed:false}; }
    } else {
      snapshots[l.id] = blankSnapshot(l);
    }
  });
  yr.months[m] = { snapshots, touched:false, sourceKey:prevKey };
  return yr.months[m];
}
function getLineValue(l, snap){ return l.type==='cash' ? (Number(snap.value)||0) : (Number(snap.quantity)||0)*(Number(snap.unitPrice)||0); }
function setLineValue(l, snap, newValue){
  if(l.type==='cash'){ snap.value = newValue; }
  else { snap.quantity = (Number(snap.unitPrice)||0)>0 ? newValue/snap.unitPrice : snap.quantity; }
}
function placementTotal(year,m){
  const month = ensurePlacementMonth(year,m);
  return state.placement.lines.reduce((s,l)=>s+getLineValue(l, month.snapshots[l.id]),0);
}
function placementBaselineTotal(year,m){
  const month = ensurePlacementMonth(year,m);
  return state.placement.lines.reduce((s,l)=>{
    const snap = month.snapshots[l.id];
    if(l.type==='cash') return s+(Number(snap.baselineValue)||0);
    return s+(Number(snap.baselineQuantity)||0)*(Number(snap.baselineUnitPrice)||0);
  },0);
}
function lineNetInvested(l, year, m){
  if(l.type!=='asset') return 0;
  const txs = (state.placement.transactions||[]).filter(t=>t.lineId===l.id && t.annee===year && t.mois===m);
  let net = 0;
  txs.forEach(t=>{
    if(t.type==='achat' || t.type==='swap') net += (Number(t.montant)||0);
    else if(t.type==='vente') net -= (Number(t.montant)||0);
  });
  return net;
}
function plusValueMonth(year,m){
  let pv = 0;
  state.placement.lines.forEach(l=>{ pv += lineePlusValueMonth(l, year, m); });
  return pv;
}
function rendementPctMonth(year,m){
  const base = placementInvestedBasis([{year,month:m}]);
  return base>0 ? (plusValueMonth(year,m)/base*100) : 0;
}
function placementInvestedBasis(pairs){
  const startPair = pairs[0];
  let basis = placementBaselineTotal(startPair.year, startPair.month);
  state.placement.lines.forEach(l=>{
    if(l.type==='asset'){
      basis += pairs.reduce((s,p)=>s+lineNetInvested(l,p.year,p.month),0);
    }
  });
  return basis;
}
function assetsNotConfirmed(year,m){
  const month = ensurePlacementMonth(year,m);
  return state.placement.lines.filter(l=>l.type==='asset').filter(l=>!month.snapshots[l.id].priceConfirmed);
}
function lineManualGains(l, year, m){
  return (state.placement.transactions||[]).filter(t=>t.lineId===l.id && t.annee===year && t.mois===m && t.type==='plusvalue').reduce((s,t)=>s+(Number(t.montant)||0),0);
}
function lineePlusValueMonth(l, year, m){
  const month = ensurePlacementMonth(year,m);
  const snap = month.snapshots[l.id];
  if(l.type==='cash'){
    let pv = lineManualGains(l, year, m);
    if(l.interestRate){
      const valueStart = Number(snap.baselineValue)||0;
      pv += valueStart * (Number(l.interestRate)||0)/100/12;
    }
    return pv;
  }
  const valueStart = (Number(snap.baselineQuantity)||0) * (Number(snap.baselineUnitPrice)||0);
  const valueEnd = (Number(snap.quantity)||0) * (Number(snap.unitPrice)||0);
  const netInvested = lineNetInvested(l, year, m);
  return valueEnd - valueStart - netInvested;
}
function linePlusValuePeriod(l, pairs){ return pairs.reduce((s,p)=>s+lineePlusValueMonth(l,p.year,p.month),0); }
function lineBaselineValueAtMonth(l, year, m){
  const month = ensurePlacementMonth(year,m); const snap = month.snapshots[l.id];
  if(l.type==='cash') return Number(snap.baselineValue)||0;
  return (Number(snap.baselineQuantity)||0)*(Number(snap.baselineUnitPrice)||0);
}
function plusValuePeriod(pairs){ return pairs.reduce((s,p)=>s+plusValueMonth(p.year,p.month),0); }
function rendementPctPeriodGeneric(pairs){
  const base = placementInvestedBasis(pairs);
  return base>0 ? (plusValuePeriod(pairs)/base*100) : 0;
}
function allPlacementYears(){ return Object.keys(state.placement.years||{}).map(Number).sort((a,b)=>a-b); }
function avgRendementByVue(){
  if(state.vue==='trimestre'){
    let s=0,count=0;
    allPlacementYears().forEach(y=>{
      const maxQ = y===REAL_YEAR ? quarterOfMonth(REAL_MONTH) : 3;
      for(let q=0;q<=maxQ;q++){
        s += rendementPctPeriodGeneric(quarterMonths(q).map(mm=>({year:y,month:mm}))); count++;
      }
    });
    return count>0? s/count:0;
  }
  if(state.vue==='debut'){
    const years = allPlacementYears();
    if(years.length===0) return 0;
    let s=0;
    years.forEach(y=>{
      const maxM = y===REAL_YEAR? REAL_MONTH:11;
      s += rendementPctPeriodGeneric(Array.from({length:maxM+1},(_,mm)=>({year:y,month:mm})));
    });
    return s/years.length;
  }
  if(state.vue==='annee'){
    const y = state.currentYear;
    const maxM = y===REAL_YEAR? REAL_MONTH:11;
    let s=0,count=0;
    for(let mm=0;mm<=maxM;mm++){ s+=rendementPctMonth(y,mm); count++; }
    return count>0? s/count:0;
  }
  let s=0,count=0;
  allPlacementYears().forEach(y=>{
    const maxM = y===REAL_YEAR? REAL_MONTH:11;
    for(let mm=0;mm<=maxM;mm++){ s+=rendementPctMonth(y,mm); count++; }
  });
  return count>0? s/count:0;
}
function transactionsInPeriod(pairs){
  const set = new Set(pairs.map(p=>p.year+'-'+p.month));
  return (state.placement.transactions||[]).filter(t=>set.has(t.annee+'-'+t.mois));
}
function computeRebalanceSuggestions(year,m){
  const month = ensurePlacementMonth(year,m); const total = placementTotal(year,m);
  if(total<=0) return [];
  const rows = state.placement.lines.map(l=>{
    const val = getLineValue(l, month.snapshots[l.id]);
    const target = Number(l.targetPct)||0;
    const targetVal = total*target/100;
    return {name:l.name, diff: targetVal-val};
  });
  const over = rows.filter(r=>r.diff<-50).sort((a,b)=>a.diff-b.diff).map(r=>({name:r.name, remaining:-r.diff}));
  const under = rows.filter(r=>r.diff>50).sort((a,b)=>b.diff-a.diff).map(r=>({name:r.name, remaining:r.diff}));
  const suggestions = [];
  let i=0,j=0;
  while(i<over.length && j<under.length){
    const amt = Math.min(over[i].remaining, under[j].remaining);
    if(amt>50) suggestions.push(`Tu as trop de ${over[i].name} — swap ${fmt(amt)} vers ${under[j].name}`);
    over[i].remaining -= amt; under[j].remaining -= amt;
    if(over[i].remaining<=50) i++;
    if(under[j].remaining<=50) j++;
  }
  return suggestions;
}

// ================= PERSO HELPERS =================
function ensurePersoYear(year){
  if(!state.perso.years) state.perso.years = {};
  if(!state.perso.years[year]) state.perso.years[year] = { months: Array.from({length:12},()=>({expenses:[],courses:[],autreRevenu:0})) };
  return state.perso.years[year];
}
function ensurePersoMonth(year, m){
  const cats = state.perso.categories.filter(c=>c.type==='fixe');
  const pm = ensurePersoYear(year).months[m];
  cats.forEach(cat=>{
    const exists = pm.expenses.some(e=>e.category===cat.name && e.fixe);
    if(!exists){
      let amount = 0;
      let cursor = {year, month:m};
      for(let i=0;i<120;i++){
        cursor = stepBack(cursor.year, cursor.month);
        const yr = state.perso.years[cursor.year];
        if(yr){
          const found = yr.months[cursor.month].expenses.find(e=>e.category===cat.name && e.fixe);
          if(found){ amount = found.montant; break; }
        }
      }
      pm.expenses.push({id:uid(), category:cat.name, montant:amount, fixe:true});
    }
  });
  return pm;
}
function validFixedNames(){ return new Set(state.perso.categories.filter(c=>c.type==='fixe').map(c=>c.name)); }
function validPlusNames(){ return new Set(state.perso.categories.filter(c=>c.type==='plus').map(c=>c.name)); }
function persoFixedTotal(year,m){ const valid=validFixedNames(); return ensurePersoMonth(year,m).expenses.filter(e=>e.fixe && valid.has(e.category)).reduce((s,e)=>s+(Number(e.montant)||0),0); }
function persoPlusTotal(year,m){ const valid=validPlusNames(); return ensurePersoMonth(year,m).expenses.filter(e=>!e.fixe && valid.has(e.category)).reduce((s,e)=>s+(Number(e.montant)||0),0); }
function persoCoursesTotal(year,m){ return ensurePersoYear(year).months[m].courses.reduce((s,c)=>s+(Number(c.montant)||0),0); }
function persoCategorySpent(year,m, name){ return ensurePersoMonth(year,m).expenses.filter(e=>e.category===name).reduce((s,e)=>s+(Number(e.montant)||0),0); }
function persoMonthTotals(year,m){
  const depenses = persoFixedTotal(year,m) + persoPlusTotal(year,m) + persoCoursesTotal(year,m);
  const revenu = totalBenefMonth(year,m) + plusValueMonth(year,m) + (Number(ensurePersoYear(year).months[m].autreRevenu)||0);
  return { revenu, depenses, reste: revenu-depenses };
}
function persoTotalsPeriod(){
  let revenu=0, depenses=0;
  periodPairs().forEach(p=>{ const t = persoMonthTotals(p.year,p.month); revenu+=t.revenu; depenses+=t.depenses; });
  return { revenu, depenses, reste: revenu-depenses };
}
function renamePersoCategoryEverywhere(oldName, newName){
  Object.values(state.perso.years||{}).forEach(yr=>{
    yr.months.forEach(mo=>{ mo.expenses.forEach(e=>{ if(e.category===oldName) e.category = newName; }); });
  });
}
function deletePersoCategoryEverywhere(name){
  Object.values(state.perso.years||{}).forEach(yr=>{
    yr.months.forEach(mo=>{ mo.expenses = mo.expenses.filter(e=>e.category!==name); });
  });
}
function persoCategoryBreakdown(){
  const totals = {};
  periodPairs().forEach(p=>{
    ensurePersoMonth(p.year,p.month).expenses.forEach(e=>{ totals[e.category] = (totals[e.category]||0) + (Number(e.montant)||0); });
    const cs = persoCoursesTotal(p.year,p.month);
    if(cs) totals['Courses'] = (totals['Courses']||0) + cs;
  });
  return totals;
}

// ================= YoY HELPER =================
function yoyPill(currentVal, prevVal){
  if(!prevVal){
    return `<span class="pill" style="background:var(--surface3);color:var(--text-dim);">Pas de données ${state.currentYear-1}</span>`;
  }
  const change = (currentVal-prevVal)/Math.abs(prevVal)*100;
  const cls = change>=0 ? 'pos' : 'neg';
  return `<span class="pill ${cls}">${change>=0?'+':''}${change.toFixed(0)}% vs ${state.currentYear-1}</span>`;
}

function buildNav(){
  const nav = document.getElementById('nav'); nav.innerHTML = '';
  const items = [{id:'recap', label:'Récap'}];
  activeBizIds().forEach(bizId=>items.push({id:'biz:'+bizId, label:state.businesses[bizId].label}));
  items.push({id:'commandes', label:'Commandes'}, {id:'transport', label:'Transport'}, {id:'placement', label:'Placement'}, {id:'perso', label:'Perso'});
  items.forEach(t=>{
    const btn = document.createElement('button');
    btn.textContent = t.label; btn.dataset.tab = t.id;
    btn.className = t.id===currentTabId ? 'active' : '';
    btn.onclick = () => switchTab(t.id);
    nav.appendChild(btn);
  });
}
function switchTab(id){
  currentTabId = id;
  document.querySelectorAll('nav button').forEach(b=>b.classList.toggle('active', b.dataset.tab===id));
  const isBiz = id.startsWith('biz:');
  document.querySelectorAll('section.tab').forEach(s=>s.classList.toggle('active', isBiz ? s.id==='tab-biz' : s.id==='tab-'+id));
  if(id==='recap') renderRecap();
  else if(isBiz) renderBizTab(id.slice(4), 'tab-biz');
  else if(id==='commandes') renderCommandes();
  else if(id==='transport') renderTransport();
  else if(id==='placement') renderPlacement();
  else if(id==='perso') renderPerso();
}
function yearPickerHTML(prevId,nextId){
  return `<div class="year-picker">
    <div class="label">${state.currentYear}</div>
    <div class="arrows"><button id="${prevId}">‹</button><button id="${nextId}">›</button></div>
  </div>`;
}
function monthPickerHTML(prevId,nextId){
  return `<div class="month-picker">
    <div class="label">${MONTHS[state.currentMonth]}</div>
    <div class="arrows"><button id="${prevId}">‹</button><button id="${nextId}">›</button></div>
  </div>`;
}
function wireYearMonthPicker(yPrev,yNext,mPrev,mNext,rerender){
  document.getElementById(yPrev).onclick = ()=>{ state.currentYear -= 1; save(); rerender(); };
  document.getElementById(yNext).onclick = ()=>{ state.currentYear += 1; save(); rerender(); };
  document.getElementById(mPrev).onclick = ()=>{
    if(state.currentMonth===0){ state.currentMonth=11; state.currentYear-=1; } else { state.currentMonth-=1; }
    save(); rerender();
  };
  document.getElementById(mNext).onclick = ()=>{
    if(state.currentMonth===11){ state.currentMonth=0; state.currentYear+=1; } else { state.currentMonth+=1; }
    save(); rerender();
  };
}
function vueToggleHTML(){
  return `<div class="vue-toggle">
    <button data-vue="mois" class="${state.vue==='mois'?'active':''}">Mois</button>
    <button data-vue="trimestre" class="${state.vue==='trimestre'?'active':''}">Trim.</button>
    <button data-vue="annee" class="${state.vue==='annee'?'active':''}">Année</button>
    <button data-vue="debut" class="${state.vue==='debut'?'active':''}">Début</button>
  </div>`;
}
function wireVueToggle(rerender){
  document.querySelectorAll('.vue-toggle [data-vue]').forEach(btn=>{
    btn.onclick = ()=>{ state.vue = btn.dataset.vue; save(); rerender(); };
  });
}
function exportReminderBanner(){
  const days = daysSinceExport();
  if(days<14) return '';
  const msg = state.lastExportAt ? `Pas de sauvegarde depuis ${Math.floor(days)} jours.` : `Tu n'as encore jamais exporté tes données.`;
  return `<div class="banner">
    <div>💾 ${msg}</div>
    <button onclick="exportDataFile()">Fichier</button>
    <button onclick="exportDataText()">Texte</button>
  </div>`;
}

function drawBizChart(bizKey){
  const biz = state.businesses[bizKey]; const year = state.currentYear;
  const ventes = Array.from({length:12},(_,i)=>bizVentesMonth(bizKey,year,i));
  const depenses = Array.from({length:12},(_,i)=>bizDepensesMonth(bizKey,year,i));
  const ctx = document.getElementById('chart-biz-'+bizKey);
  if(!ctx) return;
  if(bizCharts[bizKey]) bizCharts[bizKey].destroy();
  bizCharts[bizKey] = new Chart(ctx, { type:'bar',
    data:{ labels: MONTHS.map(mo=>mo.slice(0,3)), datasets:[
      {label:'Ventes', data:ventes, backgroundColor:biz.color+'cc', borderRadius:4},
      {label:'Dépenses', data:depenses.map(v=>-v), backgroundColor:'#f97066cc', borderRadius:4}
    ]},
    options:{ responsive:true, maintainAspectRatio:false, plugins:{legend:{labels:{color:'#8a919c',boxWidth:10,font:{size:10}}}},
      scales:{ x:{ticks:{color:'#8a919c',font:{size:9}},grid:{display:false}}, y:{ticks:{color:'#8a919c',font:{size:9}},grid:{color:'#262b33'}} } }
  });
}
function drawBizCatChart(bizKey, catTotals){
  const ctx = document.getElementById('chart-biz-cat-'+bizKey);
  if(!ctx) return;
  const entries = Object.entries(catTotals).filter(([,v])=>v>0).sort((a,b)=>b[1]-a[1]);
  const palette = ['#f97066','#5b8def','#f5c451','#c084fc','#34d399','#4dd0e1','#a3e635','#fb923c','#f472b6','#818cf8'];
  if(bizCatCharts[bizKey]) bizCatCharts[bizKey].destroy();
  if(entries.length===0) return;
  bizCatCharts[bizKey] = new Chart(ctx, { type:'doughnut',
    data:{ labels: entries.map(e=>e[0]), datasets:[{ data: entries.map(e=>e[1]), backgroundColor: palette, borderColor:'#14171c', borderWidth:2 }] },
    options:{ responsive:true, maintainAspectRatio:false, plugins:{legend:{position:'bottom',labels:{color:'#8a919c',boxWidth:10,font:{size:10},padding:8}}} }
  });
}

// ================= COMMANDES TAB =================
let cmdFilter = 'all', cmdView = 'liste', cmdSort = 'delai';
function sortCommandes(list){
  if(cmdSort==='delai'){
    return [...list].sort((a,b)=>{
      if(!a.dernierDelai && !b.dernierDelai) return 0;
      if(!a.dernierDelai) return 1;
      if(!b.dernierDelai) return -1;
      return a.dernierDelai.localeCompare(b.dernierDelai);
    });
  }
  if(cmdSort==='entree'){ return [...list].sort((a,b)=>(a.createdAt||'').localeCompare(b.createdAt||'')); }
  return list;
}
function commandCountColor(n){
  if(n<=15) return {bg:'#1d5c46', fg:'#34d399'};
  if(n<=25) return {bg:'#4a3a13', fg:'#f5c451'};
  if(n<=35) return {bg:'#5c3a13', fg:'#fb923c'};
  if(n<=50) return {bg:'#5c2a26', fg:'#f97066'};
  return {bg:'#3a1d5c', fg:'#c084fc'};
}

      <div class="cmd-dates" style="margin-bottom:8px;">

      <summary>Commandes terminées (${archived.length})</summary>
      <div class="card" style="margin-top:8px;"><div id="cmd-archived-list"></div></div>
    </details>

  document.querySelectorAll('.filter-chips [data-f]').forEach(btn=>{ btn.onclick = ()=>{ cmdFilter = btn.dataset.f; renderCommandes(); }; });
  document.querySelectorAll('.filter-chips [data-v]').forEach(btn=>{ btn.onclick = ()=>{ cmdView = btn.dataset.v; renderCommandes(); }; });
  document.getElementById('cmd-sort-select').onchange = (e)=>{ cmdSort = e.target.value; renderCommandes(); };

  document.getElementById('cmd-add').onclick = ()=>{
    const business = document.getElementById('cmd-biz').value;

function enableDragReorder(listEl){
  listEl.querySelectorAll('.cmd-row').forEach(row=>{
    const handle = row.querySelector('.drag-handle');
    if(!handle) return;
    handle.onpointerdown = (e)=>{
      e.preventDefault();
      row.classList.add('dragging');
      try{ handle.setPointerCapture(e.pointerId); }catch(err){}
      const onMove = (ev)=>{
        const siblings = Array.from(listEl.children).filter(r=>r!==row);
        const y = ev.clientY;
        let target = null;
        for(const r of siblings){
          const rect = r.getBoundingClientRect();
          if(y < rect.top + rect.height/2){ target = r; break; }
        }
        if(target){ listEl.insertBefore(row, target); } else { listEl.appendChild(row); }
      };
      const onUp = ()=>{
        row.classList.remove('dragging');
        document.removeEventListener('pointermove', onMove);
        document.removeEventListener('pointerup', onUp);
        const newOrderIds = Array.from(listEl.children).map(r=>r.dataset.id);
        const archivedOnes = state.commandes.filter(c=>c.archived);
        const reordered = newOrderIds.map(id=>state.commandes.find(c=>c.id===id)).filter(Boolean);
        const otherActive = state.commandes.filter(c=>!c.archived && !newOrderIds.includes(c.id));
        state.commandes = [...reordered, ...otherActive, ...archivedOnes];
        save();
      };
      document.addEventListener('pointermove', onMove);
      document.addEventListener('pointerup', onUp);
    };
  });
}
function enableDragReorderMulti(containerEls){
  containerEls.forEach(container=>{
    container.querySelectorAll('.cmd-row').forEach(row=>{
      const handle = row.querySelector('.drag-handle');
      if(!handle) return;
      handle.onpointerdown = (e)=>{
        e.preventDefault();
        let currentContainer = container;
        row.classList.add('dragging');
        try{ handle.setPointerCapture(e.pointerId); }catch(err){}
        const onMove = (ev)=>{
          let hoverContainer = null;
          for(const c of containerEls){
            const rect = c.getBoundingClientRect();
            if(ev.clientY >= rect.top-10 && ev.clientY <= rect.bottom+10){ hoverContainer = c; break; }
          }
          if(!hoverContainer) hoverContainer = currentContainer;
          const siblings = Array.from(hoverContainer.children).filter(r=>r!==row);
          let target = null;
          for(const r of siblings){
            const rect = r.getBoundingClientRect();
            if(ev.clientY < rect.top + rect.height/2){ target = r; break; }
          }
          if(target) hoverContainer.insertBefore(row, target);
          else hoverContainer.appendChild(row);
          currentContainer = hoverContainer;
        };
        const onUp = ()=>{
          row.classList.remove('dragging');
          document.removeEventListener('pointermove', onMove);
          document.removeEventListener('pointerup', onUp);
          const finalDay = currentContainer.dataset.day;
          const c = state.commandes.find(x=>x.id===row.dataset.id);
          c.jour = (finalDay==='none' || !finalDay) ? null : finalDay;
          const newOrderIds = Array.from(currentContainer.children).map(r=>r.dataset.id);
          const reorderedDayItems = newOrderIds.map(id=>state.commandes.find(x=>x.id===id)).filter(Boolean);
          const others = state.commandes.filter(x=>!newOrderIds.includes(x.id));
          state.commandes = [...others, ...reorderedDayItems];
          save();
          renderCommandes();
        };
        document.addEventListener('pointermove', onMove);
        document.addEventListener('pointerup', onUp);
      };
    });
  });
}
