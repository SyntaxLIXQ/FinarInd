  `).join('') : `<tr><td colspan="4" class="empty">Aucune ligne cash</td></tr>`;
  cashRows.querySelectorAll('[data-namefield]').forEach(inp=>{ inp.onchange = (e)=>{ state.placement.lines.find(l=>l.id===e.target.dataset.namefield).name = e.target.value; save(); renderPlacement(); }; });
  cashRows.querySelectorAll('[data-cashvalue]').forEach(inp=>{ inp.onchange = (e)=>{ month.snapshots[e.target.dataset.cashvalue].value = parseNum(e.target.value); month.touched = true; save(); renderPlacement(); }; });
  cashRows.querySelectorAll('[data-rate]').forEach(inp=>{ inp.onchange = (e)=>{ state.placement.lines.find(l=>l.id===e.target.dataset.rate).interestRate = parseNum(e.target.value); save(); renderPlacement(); }; });
  cashRows.querySelectorAll('[data-delline]').forEach(btn=>{ btn.onclick = ()=>{ state.placement.lines = state.placement.lines.filter(l=>l.id!==btn.dataset.delline); save(); renderPlacement(); }; });
  document.getElementById('pl-add-cash').onclick = ()=>{
    const name = document.getElementById('pl-new-cash-name').value.trim();
    if(!name) return;
    state.placement.lines.push({id:uid(), name, type:'cash', interestRate:0});
    purgeUntouchedPlacementCache();
    save(); renderPlacement();
  };

  const assetRows = document.getElementById('pl-asset-rows');
  assetRows.innerHTML = assetLines.length ? assetLines.map(l=>{
    const s = month.snapshots[l.id];
    return `
    <tr>
      <td><input class="cell txt" data-namefield="${l.id}" value="${l.name}"></td>
      <td class="num"><input class="cell" data-qty="${l.id}" type="text" inputmode="decimal" step="0.0001" value="${s.quantity||''}" placeholder="0"></td>
      <td class="num"><input class="cell" data-price="${l.id}" type="text" inputmode="decimal" step="0.01" value="${s.unitPrice||''}" placeholder="0"></td>
      <td class="num">${fmt2(s.avgCost)}</td>
      <td class="num">${fmt(getLineValue(l,s))} <button class="del-btn" data-delline="${l.id}">✕</button></td>
    </tr>`;
  }).join('') : `<tr><td colspan="5" class="empty">Aucun actif</td></tr>`;
  assetRows.querySelectorAll('[data-namefield]').forEach(inp=>{ inp.onchange = (e)=>{ state.placement.lines.find(l=>l.id===e.target.dataset.namefield).name = e.target.value; save(); renderPlacement(); }; });
  assetRows.querySelectorAll('[data-qty]').forEach(inp=>{ inp.onchange = (e)=>{ month.snapshots[e.target.dataset.qty].quantity = parseNum(e.target.value); month.touched = true; save(); renderPlacement(); }; });
  assetRows.querySelectorAll('[data-price]').forEach(inp=>{ inp.onchange = (e)=>{ const s=month.snapshots[e.target.dataset.price]; s.unitPrice = parseNum(e.target.value); s.priceConfirmed = true; month.touched = true; save(); renderPlacement(); }; });
  assetRows.querySelectorAll('[data-delline]').forEach(btn=>{ btn.onclick = ()=>{ state.placement.lines = state.placement.lines.filter(l=>l.id!==btn.dataset.delline); save(); renderPlacement(); }; });
  document.getElementById('pl-add-asset').onclick = ()=>{
    const name = document.getElementById('pl-new-asset-name').value.trim();
    if(!name) return;
    state.placement.lines.push({id:uid(), name, type:'asset'});
    purgeUntouchedPlacementCache();
    save(); renderPlacement();
  };

  document.getElementById('pl-buy-btn').onclick = ()=>{
    const id = document.getElementById('pl-buy-line').value;
    const qty = parseNum(document.getElementById('pl-buy-qty').value);
    const price = parseNum(document.getElementById('pl-buy-price').value);
    const dateStr = document.getElementById('pl-buy-date').value || todayISO();
    if(!id || !qty) return;
    const d = new Date(dateStr+'T00:00:00');
    const buyYear = d.getFullYear(), buyMonth = d.getMonth();
    const targetMonth = ensurePlacementMonth(buyYear, buyMonth);
    const s = targetMonth.snapshots[id];
    const oldQty = Number(s.quantity)||0, oldAvg = Number(s.avgCost)||0;
    const newQty = oldQty + qty;
    if(price>0){
      s.avgCost = newQty>0 ? (oldQty*oldAvg + qty*price)/newQty : 0;
      // if no market price was ever set for this line, use the purchase price so "Valeur" isn't stuck at 0
      if((Number(s.unitPrice)||0)===0){ s.unitPrice = price; s.priceConfirmed = true; }
    }
    s.quantity = newQty;
    targetMonth.touched = true;
    const lineName = state.placement.lines.find(l=>l.id===id).name;
    state.placement.transactions = state.placement.transactions || [];
    state.placement.transactions.push({id:uid(), lineId:id, lineName, type:'achat', quantity:qty, montant:qty*price, annee:buyYear, mois:buyMonth, date:dateStr});
    save(); renderPlacement();
  };
  document.getElementById('pl-sell-btn').onclick = ()=>{
    const id = document.getElementById('pl-sell-line').value;
    const qty = parseNum(document.getElementById('pl-sell-qty').value);
    const dateStr = document.getElementById('pl-sell-date').value || todayISO();
    if(!id || !qty) return;
    const d = new Date(dateStr+'T00:00:00');
    const sellYear = d.getFullYear(), sellMonth = d.getMonth();
    const targetMonth = ensurePlacementMonth(sellYear, sellMonth);
    const s = targetMonth.snapshots[id];
    s.quantity = (Number(s.quantity)||0) - qty;
    targetMonth.touched = true;
    const lineName = state.placement.lines.find(l=>l.id===id).name;
    state.placement.transactions = state.placement.transactions || [];
    state.placement.transactions.push({id:uid(), lineId:id, lineName, type:'vente', quantity:qty, montant:qty*(Number(s.unitPrice)||0), annee:sellYear, mois:sellMonth, date:dateStr});
    save(); renderPlacement();
  };
  document.getElementById('pl-spread-btn').onclick = ()=>{
    const lineId = document.getElementById('pl-spread-line').value;
    const spreadYear = parseInt(document.getElementById('pl-spread-year').value, 10);
    const startVal = parseNum(document.getElementById('pl-spread-start').value);
    const endVal = parseNum(document.getElementById('pl-spread-end').value);
    const gainTotal = parseNum(document.getElementById('pl-spread-gain').value);
    if(!lineId || !spreadYear) return;
    const totalGrowth = endVal - startVal;
    const depotTotal = totalGrowth - gainTotal;
    const line = state.placement.lines.find(l=>l.id===lineId);
    const lineName = line.name;
    state.placement.transactions = state.placement.transactions || [];
    for(let mm=0; mm<12; mm++){
      const monthRec = ensurePlacementMonth(spreadYear, mm);
      const startOfMonth = startVal + totalGrowth*mm/12;
      const endOfMonth = startVal + totalGrowth*(mm+1)/12;
      monthRec.snapshots[lineId] = { value: endOfMonth, baselineValue: startOfMonth };
      monthRec.touched = true;
      const gainIncrement = gainTotal/12;
      const depotIncrement = depotTotal/12;
      const dateStr = `${spreadYear}-${String(mm+1).padStart(2,'0')}-15`;
      if(Math.abs(gainIncrement)>0.001){
        state.placement.transactions.push({id:uid(), lineId, lineName, type:'plusvalue', quantity:null, montant:gainIncrement, annee:spreadYear, mois:mm, date:dateStr});
      }
      if(Math.abs(depotIncrement)>0.001){
        state.placement.transactions.push({id:uid(), lineId, lineName, type:'depot', quantity:null, montant:depotIncrement, annee:spreadYear, mois:mm, date:dateStr});
      }
    }
    save(); renderPlacement();
    customAlert(`${lineName} réparti sur ${spreadYear} : ${fmt(startVal)} → ${fmt(endVal)} (dont ${fmt(gainTotal)} de plus-value, ${fmt(depotTotal)} de dépôts).`);
  };
  document.getElementById('pl-spread-a-prefill').onclick = ()=>{
    const lineId = document.getElementById('pl-spread-a-line').value;
    const spreadYear = parseInt(document.getElementById('pl-spread-a-year').value, 10);
    if(!lineId || !spreadYear) return;
    const startSnap = ensurePlacementMonth(spreadYear, 0).snapshots[lineId];
    document.getElementById('pl-spread-a-qtystart').value = Number(startSnap.quantity)||0;
  };
  document.getElementById('pl-spread-a-btn').onclick = ()=>{
    const lineId = document.getElementById('pl-spread-a-line').value;
    const spreadYear = parseInt(document.getElementById('pl-spread-a-year').value, 10);
    const qtyEnd = parseNum(document.getElementById('pl-spread-a-qtyend').value);
    const priceEnd = parseNum(document.getElementById('pl-spread-a-priceend').value);
    const priceStart = parseNum(document.getElementById('pl-spread-a-pricestart').value);
    const newPurchasePrice = parseNum(document.getElementById('pl-spread-a-pru').value);
    if(!lineId || !spreadYear) return;
    const line = state.placement.lines.find(l=>l.id===lineId);
    const lineName = line.name;
    // starting point: use what the user typed if they filled it in (e.g. their very first
    // tracked year, where there's no prior touched month to carry forward from); otherwise
    // fall back to whatever the normal carry-forward already provides.
    const startSnap = ensurePlacementMonth(spreadYear, 0).snapshots[lineId];
    const qtyStartField = document.getElementById('pl-spread-a-qtystart').value;
    const qtyStart = qtyStartField.trim()!=='' ? parseNum(qtyStartField) : (Number(startSnap.quantity)||0);
    const oldPru = Number(startSnap.avgCost)||0;
    const qtyAddedTotal = qtyEnd - qtyStart;
    // weighted-average PRU: old holdings at their old cost basis + new units at what was actually paid for them
    const newAvgCost = qtyEnd>0
      ? (qtyStart>0 ? (qtyStart*oldPru + Math.max(qtyAddedTotal,0)*newPurchasePrice) / qtyEnd : newPurchasePrice)
      : 0;
    state.placement.transactions = state.placement.transactions || [];
    for(let mm=0; mm<12; mm++){
      const monthRec = ensurePlacementMonth(spreadYear, mm);
      const qStart = qtyStart + (qtyEnd-qtyStart)*mm/12;
      const qEnd = qtyStart + (qtyEnd-qtyStart)*(mm+1)/12;
      const pStart = priceStart + (priceEnd-priceStart)*mm/12;
      const pEnd = priceStart + (priceEnd-priceStart)*(mm+1)/12;
      const avgCostThisMonth = oldPru + (newAvgCost-oldPru)*(mm+1)/12;
      monthRec.snapshots[lineId] = { quantity:qEnd, unitPrice:pEnd, baselineQuantity:qStart, baselineUnitPrice:pStart, avgCost:avgCostThisMonth, priceConfirmed:true };
      monthRec.touched = true;
      const qtyAdded = qEnd - qStart;
      if(Math.abs(qtyAdded)>0.00001){
        const montant = Math.abs(qtyAdded)*(newPurchasePrice>0?newPurchasePrice:pEnd);
        state.placement.transactions.push({id:uid(), lineId, lineName, type: qtyAdded>0?'achat':'vente', quantity:Math.abs(qtyAdded), montant, annee:spreadYear, mois:mm, date:`${spreadYear}-${String(mm+1).padStart(2,'0')}-15`});
      }
    }
    save(); renderPlacement();
    const gainOldHoldings = qtyStart*(priceEnd-priceStart);
    const gainNewPurchases = Math.max(qtyAddedTotal,0)*(priceEnd-newPurchasePrice);
    customAlert(`${lineName} réparti sur ${spreadYear} : ${qtyStart} → ${qtyEnd} unités (PRU global : ${fmt2(newAvgCost)}). Plus-value calculée : ${fmt(gainOldHoldings+gainNewPurchases)} (dont ${fmt(gainNewPurchases)} sur les unités achetées cette année).`);
  };
  document.getElementById('pl-depot-btn').onclick = ()=>{
    const id = document.getElementById('pl-depot-line').value;
    const montant = parseNum(document.getElementById('pl-depot-montant').value);
    const dateStr = document.getElementById('pl-depot-date').value || todayISO();
    if(!id || !montant) return;
    const d = new Date(dateStr+'T00:00:00');
    const depYear = d.getFullYear(), depMonth = d.getMonth();
    const targetMonth = ensurePlacementMonth(depYear, depMonth);
    const s = targetMonth.snapshots[id];
    s.value = (Number(s.value)||0) + montant;
    targetMonth.touched = true;
    const lineName = state.placement.lines.find(l=>l.id===id).name;
    state.placement.transactions = state.placement.transactions || [];
    state.placement.transactions.push({id:uid(), lineId:id, lineName, type:'depot', quantity:null, montant, annee:depYear, mois:depMonth, date:dateStr});
    save(); renderPlacement();
  };
  document.getElementById('pl-pv-btn').onclick = ()=>{
    const id = document.getElementById('pl-pv-line').value;
    const montant = parseNum(document.getElementById('pl-pv-montant').value);
    const dateStr = document.getElementById('pl-pv-date').value || todayISO();
    if(!id || !montant) return;
    const d = new Date(dateStr+'T00:00:00');
    const pvYear = d.getFullYear(), pvMonth = d.getMonth();
    const targetMonth = ensurePlacementMonth(pvYear, pvMonth);
    const s = targetMonth.snapshots[id];
    s.value = (Number(s.value)||0) + montant;
    targetMonth.touched = true;
    const lineName = state.placement.lines.find(l=>l.id===id).name;
    state.placement.transactions = state.placement.transactions || [];
    state.placement.transactions.push({id:uid(), lineId:id, lineName, type:'plusvalue', quantity:null, montant, annee:pvYear, mois:pvMonth, date:dateStr});
    save(); renderPlacement();
  };

  const fromSel = document.getElementById('pl-from'), toSel = document.getElementById('pl-to');
  const opts = state.placement.lines.map(l=>`<option value="${l.id}">${l.name} (${fmt(getLineValue(l, month.snapshots[l.id]))})</option>`).join('');
  fromSel.innerHTML = opts; toSel.innerHTML = opts;
  if(state.placement.lines.length>1) toSel.selectedIndex = 1;
  document.getElementById('pl-swap').onclick = ()=>{
    const fromId = fromSel.value, toId = toSel.value;
    const amount = parseNum(document.getElementById('pl-swap-amount').value);
    if(!amount || fromId===toId) return;
    const fromLine = state.placement.lines.find(l=>l.id===fromId), toLine = state.placement.lines.find(l=>l.id===toId);
    const fromSnap = month.snapshots[fromId], toSnap = month.snapshots[toId];
    setLineValue(fromLine, fromSnap, getLineValue(fromLine,fromSnap)-amount);
    setLineValue(toLine, toSnap, getLineValue(toLine,toSnap)+amount);
    month.touched = true;
    state.placement.transactions = state.placement.transactions || [];
    state.placement.transactions.push({id:uid(), lineId:toId, lineName:`${fromLine.name} → ${toLine.name}`, type:'swap', quantity:null, montant:amount, annee:year, mois:m, date:todayISO()});
    save(); renderPlacement();
  };

  const allocRows = document.getElementById('pl-alloc-rows');
  const totalNow = total;
  const allocPairs = periodPairs();
  allocRows.innerHTML = state.placement.lines.map(l=>{
    const s = month.snapshots[l.id];
    const val = getLineValue(l,s);
    const curPct = totalNow>0 ? val/totalNow*100 : 0;
    const target = Number(l.targetPct)||0;
    const targetVal = totalNow*target/100;
    const diff = targetVal - val;
    const gapPts = Math.abs(curPct-target);
    const statusColor = target<=0 ? 'var(--text-dim)' : gapPts<=3 ? 'var(--accent)' : gapPts<=10 ? 'var(--warn)' : 'var(--danger)';
    const linePerf = allocPairs.reduce((sum,p)=>sum+lineePlusValueMonth(l,p.year,p.month),0);
    return `<tr>
      <td><span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:${statusColor};"></span></td>
      <td>${l.name}<div class="mini-label">${fmt(val)}</div></td>
      <td class="num">${curPct.toFixed(1)}%</td>
      <td class="num"><input class="cell" data-target="${l.id}" type="text" inputmode="decimal" value="${l.targetPct||''}" placeholder="0"></td>
      <td class="num" style="color:${Math.abs(diff)<50?'var(--text-dim)':(diff>0?'var(--accent)':'var(--danger)')}">${diff>=0?'+':''}${fmt(diff)}</td>
      <td class="num" style="color:${linePerf>=0?'var(--accent)':'var(--danger)'}">${linePerf>=0?'+':''}${fmt(linePerf)}</td>
    </tr>`;
  }).join('');
  const sumTarget = state.placement.lines.reduce((s,l)=>s+(Number(l.targetPct)||0),0);
  document.getElementById('pl-alloc-sum').textContent = `Total des cibles : ${sumTarget.toFixed(0)}%` + (sumTarget!==100 ? ' (idéalement 100%)' : ' ✓');
  allocRows.querySelectorAll('[data-target]').forEach(inp=>{
    inp.onchange = (e)=>{ state.placement.lines.find(l=>l.id===e.target.dataset.target).targetPct = parseNum(e.target.value); save(); renderPlacement(); };
  });

  wireYearMonthPicker('pl-yprev','pl-ynext','pl-prev','pl-next', renderPlacement);
  wireVueToggle(renderPlacement);
  renderPlacementPerf();
  drawPlacementChart(year,m);
  drawRendementChart();
}
function renderPlacementPerf(){
  const container = document.getElementById('pl-perf-body');
  if(!container) return;
  const pairs = periodPairs();
  const pv = plusValuePeriod(pairs);
  const rendementPeriod = rendementPctPeriodGeneric(pairs);
  const avgRendement = avgRendementByVue();
  const rows = state.placement.lines
    .map(l=>({
      id:l.id,
      name:l.name,
      pv: linePlusValuePeriod(l, pairs),
      base: lineBaselineValueAtMonth(l, pairs[0].year, pairs[0].month) + pairs.reduce((s,p)=>s+lineNetInvested(l,p.year,p.month),0),
      type:l.type,
      interestRate:l.interestRate
    }))
    .filter(r=>r.type==='asset' || (r.type==='cash' && (r.interestRate || Math.abs(r.pv)>0.001)))
    .map(r=>({...r, pct: r.base>0 ? (r.pv/r.base*100) : 0}))
    .sort((a,b)=>b.pv-a.pv);
  const txs = transactionsInPeriod(pairs).slice().reverse();
  container.innerHTML = `
    <div class="row" style="margin-bottom:6px;">
      <div class="mini-label">Plus/moins-value — ${periodLabel()}</div>
      <div class="mini-value num" style="color:${pv>=0?'var(--accent)':'var(--danger)'}">${pv>=0?'+':''}${fmt(pv)}</div>
    </div>
    <div class="row" style="margin-bottom:6px;">
      <div class="mini-label">Rendement — ${periodLabel()}</div>
      <div class="mini-value num" style="color:${rendementPeriod>=0?'var(--accent)':'var(--danger)'}">${pctStr(rendementPeriod)}</div>
    </div>
    <div class="row" style="margin-bottom:10px;">
      <div class="mini-label">Rendement moyen (${state.vue==='trimestre'?'par trimestre':state.vue==='debut'?'par année':state.vue==='annee'?'par mois, sur '+state.currentYear:'par mois'})</div>
      <div class="mini-value num">${pctStr(avgRendement)}</div>
    </div>
    <table class="subtle-table">
      <thead><tr><th>Ligne</th><th class="num">Plus/moins-value</th><th class="num">%</th></tr></thead>
      <tbody>
        ${rows.length ? rows.map((r,i)=>`
          <tr>
            <td>${i===0 && r.pv>0 ? '🏆 ' : ''}${r.name}</td>
            <td class="num" style="color:${r.pv>=0?'var(--accent)':'var(--danger)'}">${r.pv>=0?'+':''}${fmt(r.pv)}</td>
            <td class="num" style="color:${r.pct>=0?'var(--accent)':'var(--danger)'}">${pctStr(r.pct)}</td>
          </tr>
        `).join('') : `<tr><td class="empty">Aucun actif</td></tr>`}
      </tbody>
    </table>
    <div class="mini-label" style="margin:12px 0 6px;">Mouvements réalisés — ${periodLabel()}</div>
    <table class="subtle-table">
      <tbody>
        ${txs.length ? txs.map(t=>`
          <tr>
            <td>${t.date} <span class="mini-label">(${monthYearLabel(t.annee,t.mois)})</span></td>
            <td>${t.type==='achat'?'Achat':t.type==='vente'?'Vente':t.type==='plusvalue'?'Plus-value':t.type==='depot'?'Dépôt':'Swap'} ${t.lineName}</td>
            <td class="num">${t.quantity ? (t.quantity+' × ') : ''}${fmt(t.montant)}</td>
          </tr>
        `).join('') : `<tr><td class="empty">Aucun mouvement</td></tr>`}
      </tbody>
    </table>
  `;
}
function drawPlacementChart(year,m){
  const ctx = document.getElementById('chart-placement');
  if(!ctx) return;
  const month = ensurePlacementMonth(year,m);
  const lines = state.placement.lines.filter(l=>getLineValue(l, month.snapshots[l.id])>0);
  const palette = ['#34d399','#5b8def','#f5c451','#c084fc','#f97066','#4dd0e1','#a3e635','#fb923c','#f472b6','#818cf8'];
  if(placementChart) placementChart.destroy();
  if(lines.length===0) return;
  placementChart = new Chart(ctx, { type:'doughnut',
    data:{ labels:lines.map(l=>l.name), datasets:[{ data:lines.map(l=>getLineValue(l, month.snapshots[l.id])), backgroundColor:palette, borderColor:'#14171c', borderWidth:2 }] },
    options:{ responsive:true, maintainAspectRatio:false, plugins:{legend:{position:'bottom',labels:{color:'#8a919c',boxWidth:10,font:{size:10},padding:10}}} }
  });
}
function drawRendementChart(){
  const ctx = document.getElementById('chart-rendement');
  if(!ctx) return;
  const year = state.currentYear;
  const data = Array.from({length:12},(_,i)=> (year<REAL_YEAR || (year===REAL_YEAR && i<=REAL_MONTH)) ? rendementPctMonth(year,i) : null);
  if(rendementChart) rendementChart.destroy();
  rendementChart = new Chart(ctx, { type:'bar',
    data:{ labels: MONTHS.map(mo=>mo.slice(0,3)), datasets:[{ data, backgroundColor:data.map(v=>v>=0?themeAccent()+'cc':'#f97066cc'), borderRadius:4 }] },
    options:{ responsive:true, maintainAspectRatio:false, plugins:{legend:{display:false}},
      scales:{ x:{ticks:{color:'#8a919c',font:{size:9}},grid:{display:false}}, y:{ticks:{color:'#8a919c',font:{size:9},callback:v=>v+'%'},grid:{color:'#262b33'}} } }
  });
}

// ================= PERSO TAB =================
let persoChart = null, persoCatChart = null;
function renderPerso(){
  const el = document.getElementById('tab-perso');
  const year = state.currentYear, m = state.currentMonth;
  const pm = ensurePersoMonth(year,m);
  const totals = persoTotalsPeriod();
  const pv = plusValueMonth(year,m);
  const fixedCats = state.perso.categories.filter(c=>c.type==='fixe');
  const plusCats = state.perso.categories.filter(c=>c.type==='plus');
  const fixedEntries = pm.expenses.filter(e=>e.fixe && validFixedNames().has(e.category));
  const plusEntries = pm.expenses.filter(e=>!e.fixe && validPlusNames().has(e.category));
  const yearMaxMPerso = year===REAL_YEAR ? REAL_MONTH : 11;
  const avgResteYear = Array.from({length:yearMaxMPerso+1},(_,i)=>persoMonthTotals(year,i).reste).reduce((a,b)=>a+b,0)/(yearMaxMPerso+1);
  const depFixePeriod = periodPairs().reduce((s,p)=>s+persoFixedTotal(p.year,p.month),0);
  const depPlusPeriod = periodPairs().reduce((s,p)=>s+persoPlusTotal(p.year,p.month),0);
  const depCoursesPeriod = periodPairs().reduce((s,p)=>s+persoCoursesTotal(p.year,p.month),0);

  el.innerHTML = `
    ${yearPickerHTML('perso-yprev','perso-ynext')}
    ${monthPickerHTML('perso-prev','perso-next')}
    ${vueToggleHTML()}

    <div class="grid3">
      <div class="card" style="padding:12px;"><div class="mini-label">Revenu</div><div class="mini-value num" style="color:var(--accent)">${fmt(totals.revenu)}</div></div>
      <div class="card" style="padding:12px;"><div class="mini-label">Dépenses</div><div class="mini-value num" style="color:var(--danger)">${fmt(totals.depenses)}</div></div>
      <div class="card" style="padding:12px;"><div class="mini-label">À mettre de côté</div><div class="mini-value num">${fmt(totals.reste)}</div></div>
    </div>

    <div class="card">
      <div class="card-title">Détail des dépenses — ${periodLabel()}</div>
      <table class="subtle-table">
        <tr><td>Charges fixes</td><td class="num">${fmt(depFixePeriod)}</td></tr>
        <tr><td>Courses</td><td class="num">${fmt(depCoursesPeriod)}</td></tr>
        <tr><td>En plus</td><td class="num">${fmt(depPlusPeriod)}</td></tr>
        <tr><td><b>Total</b></td><td class="num"><b>${fmt(depFixePeriod+depCoursesPeriod+depPlusPeriod)}</b></td></tr>
      </table>
    </div>

    ${state.vue==='mois' ? `
    <div class="card">
      <div class="card-title">Détail du revenu — ${monthYearLabel(year,m)}</div>
      <table class="subtle-table">
        <tr><td>Bénéfice business</td><td class="num">${fmt(totalBenefMonth(year,m))}</td></tr>
        <tr><td>Plus-value patrimoine</td><td class="num" style="color:${pv>=0?'var(--accent)':'var(--danger)'}">${pv>=0?'+':''}${fmt(pv)}</td></tr>
        <tr><td>Autre revenu</td><td class="num"><input class="cell" type="text" inputmode="decimal" step="0.01" id="perso-autre-revenu" value="${pm.autreRevenu||''}" placeholder="0"></td></tr>
      </table>
    </div>` : ''}

    <div class="card">
      <div class="card-title">Répartition des dépenses — ${periodLabel()}</div>
      <div class="chart-wrap tall"><canvas id="chart-perso-cat"></canvas></div>
    </div>

    <div class="card">
      <div class="card-title">Charges fixes — ${monthYearLabel(year,m)} <span class="pill neg">- ${fmt(persoFixedTotal(year,m))}</span></div>
      <table><tbody id="perso-fixed-rows"></tbody></table>
      <button class="add-row-btn" id="perso-fixed-report-btn">↺ Reporter le mois précédent</button>
      <div class="mini-label" style="margin-top:8px;">Se reporte déjà automatiquement chaque mois. Le bouton ci-dessus force une resynchronisation si besoin — modifier une valeur ensuite ne change que ${monthYearLabel(year,m)}.</div>
      <details style="margin-top:10px;">
        <summary>Gérer les charges fixes (noms)</summary>
        <div class="cat-manager"><div id="fixed-cat-chips"></div>
          <div class="inline-form" style="margin-top:8px;margin-bottom:0;">
            <input type="text" id="fixed-cat-new" placeholder="Nouvelle charge fixe">
            <button id="fixed-cat-add">+</button>
          </div>
        </div>
      </details>
    </div>

    <div class="card">
      <div class="card-title">Courses (alimentaire) — ${monthYearLabel(year,m)} <span class="pill neg">- ${fmt(persoCoursesTotal(year,m))}</span></div>
      <div class="inline-form">
        <input type="text" inputmode="decimal" step="0.01" id="courses-montant" placeholder="Montant €">
        <button id="courses-add">+ Ajouter</button>
      </div>
      <table><tbody id="courses-rows"></tbody></table>
    </div>

    <div class="card">
      <div class="card-title">En plus — ${monthYearLabel(year,m)} <span class="pill neg">- ${fmt(persoPlusTotal(year,m))}</span></div>
      <div class="inline-form">
        <select class="txt" id="plus-cat">${plusCats.map(c=>`<option value="${c.name}">${c.name}</option>`).join('')}</select>
        <input type="text" inputmode="decimal" step="0.01" id="plus-montant" placeholder="Montant €">
        <input type="text" id="plus-note" placeholder="Note (optionnel)">
        <button id="plus-add">+ Ajouter</button>
      </div>
      <div id="plus-budgets" style="margin-bottom:8px;"></div>
      <table><tbody id="plus-rows"></tbody></table>
      <details style="margin-top:10px;">
        <summary>Gérer les catégories "en plus"</summary>
        <div class="cat-manager"><div id="plus-cat-chips"></div>
          <div class="inline-form" style="margin-top:8px;margin-bottom:0;">
            <input type="text" id="plus-cat-new" placeholder="Nouvelle catégorie">
            <input type="text" inputmode="decimal" id="plus-cat-cap" placeholder="Plafond € (optionnel)" style="width:110px;">
            <button id="plus-cat-add">+</button>
          </div>
        </div>
      </details>
    </div>

    <div class="card">
      <div class="card-title">À mettre de côté — ${year} <span class="pill pos">Moy. ${fmt(avgResteYear)}/mois</span></div>
      <div class="chart-wrap"><canvas id="chart-perso"></canvas></div>
    </div>
  `;

  if(state.vue==='mois'){
    document.getElementById('perso-autre-revenu').onchange = (e)=>{ pm.autreRevenu = parseNum(e.target.value); save(); renderPerso(); };
  }

  const fixedRows = document.getElementById('perso-fixed-rows');
  fixedRows.innerHTML = fixedEntries.length ? fixedEntries.map(e=>`
    <tr><td>${e.category}</td><td class="num"><input class="cell" data-field="montant" data-id="${e.id}" type="text" inputmode="decimal" step="0.01" value="${e.montant||''}"></td></tr>
  `).join('') : `<tr><td class="empty">Aucune charge fixe définie</td></tr>`;
  fixedRows.querySelectorAll('input[data-field]').forEach(inp=>{
    inp.onchange = (e)=>{ pm.expenses.find(x=>x.id===e.target.dataset.id).montant = parseNum(e.target.value); save(); renderPerso(); };
  });
  const fixedChips = document.getElementById('fixed-cat-chips');
  fixedChips.innerHTML = fixedCats.map(c=>`<span class="cat-chip"><input type="text" data-renamefixed="${c.name}" value="${c.name}"><button data-fixeddel="${c.name}">✕</button></span>`).join('');
  fixedChips.querySelectorAll('[data-renamefixed]').forEach(inp=>{
    inp.onchange = (e)=>{
      const cat = state.perso.categories.find(x=>x.name===e.target.dataset.renamefixed);
      const newName = e.target.value.trim();
      if(newName && newName!==cat.name){ renamePersoCategoryEverywhere(cat.name, newName); cat.name = newName; save(); renderPerso(); }
    };
  });
  fixedChips.querySelectorAll('[data-fixeddel]').forEach(btn=>{ btn.onclick = ()=>{ deletePersoCategoryEverywhere(btn.dataset.fixeddel); state.perso.categories = state.perso.categories.filter(c=>c.name!==btn.dataset.fixeddel); save(); renderPerso(); }; });
  document.getElementById('fixed-cat-add').onclick = ()=>{
    const inp = document.getElementById('fixed-cat-new'); const val = inp.value.trim();
    if(val && !state.perso.categories.some(c=>c.name===val)){ state.perso.categories.push({name:val, type:'fixe'}); save(); renderPerso(); }
  };
  document.getElementById('perso-fixed-report-btn').onclick = ()=>{
    fixedCats.forEach(cat=>{
      let amount = null;
      let cursor = {year, month:m};
      for(let i=0;i<120;i++){
        cursor = stepBack(cursor.year, cursor.month);
        const yr = state.perso.years[cursor.year];
        if(yr){
          const found = yr.months[cursor.month].expenses.find(e=>e.category===cat.name && e.fixe);
          if(found){ amount = found.montant; break; }
        }
      }
      if(amount!==null){
        let entry = pm.expenses.find(e=>e.category===cat.name && e.fixe);
        if(entry){ entry.montant = amount; }
        else { pm.expenses.push({id:uid(), category:cat.name, montant:amount, fixe:true}); }
      }
    });
    save(); renderPerso();
  };

  const coursesRows = document.getElementById('courses-rows');
  const coursesList = ensurePersoYear(year).months[m].courses;
  coursesRows.innerHTML = coursesList.length ? coursesList.map(c=>`
    <tr><td class="num"><input class="cell" data-field="montant" data-id="${c.id}" type="text" inputmode="decimal" step="0.01" value="${c.montant||''}"></td>
    <td><button class="del-btn" data-del="${c.id}">✕</button></td></tr>
  `).join('') : `<tr><td colspan="2" class="empty">Aucune course ce mois</td></tr>`;
  coursesRows.querySelectorAll('input[data-field]').forEach(inp=>{
    inp.onchange = (e)=>{ coursesList.find(x=>x.id===e.target.dataset.id).montant = parseNum(e.target.value); save(); renderPerso(); };
  });
  coursesRows.querySelectorAll('[data-del]').forEach(btn=>{ btn.onclick = ()=>{ ensurePersoYear(year).months[m].courses = coursesList.filter(x=>x.id!==btn.dataset.del); save(); renderPerso(); }; });
  document.getElementById('courses-add').onclick = ()=>{
    const montant = parseNum(document.getElementById('courses-montant').value);
    if(!montant) return;
    coursesList.push({id:uid(), montant});
    save(); renderPerso();
  };

  const budgetsEl = document.getElementById('plus-budgets');
  const capCats = plusCats.filter(c=>c.cap);
  budgetsEl.innerHTML = capCats.map(c=>{
    const spent = persoCategorySpent(year,m, c.name);
    const pctv = Math.min(100, (spent/c.cap*100));
    const over = spent>c.cap;
    return `<div style="margin-bottom:6px;"><div class="row"><span class="mini-label">${c.name}</span><span class="mini-label">${fmt(spent)} / ${fmt(c.cap)}</span></div>
      <div class="budget-bar ${over?'over':''}"><div style="width:${pctv}%"></div></div></div>`;
  }).join('');

  const plusRows = document.getElementById('plus-rows');
  plusRows.innerHTML = plusEntries.length ? plusEntries.map(e=>`
    <tr><td>${e.category}</td><td class="num"><input class="cell" data-field="montant" data-id="${e.id}" type="text" inputmode="decimal" step="0.01" value="${e.montant||''}"></td>
    <td><input class="cell txt" data-field="note" data-id="${e.id}" type="text" value="${e.note||''}" placeholder="—"></td>
    <td><button class="del-btn" data-del="${e.id}">✕</button></td></tr>
  `).join('') : `<tr><td colspan="4" class="empty">Aucune dépense "en plus" ce mois</td></tr>`;
  plusRows.querySelectorAll('input[data-field]').forEach(inp=>{
    inp.onchange = (e)=>{
      const entry = pm.expenses.find(x=>x.id===e.target.dataset.id);
      const f = e.target.dataset.field;
      entry[f] = f==='montant' ? (parseNum(e.target.value)) : e.target.value;
      save(); renderPerso();
    };
  });
  plusRows.querySelectorAll('[data-del]').forEach(btn=>{ btn.onclick = ()=>{ pm.expenses = pm.expenses.filter(x=>x.id!==btn.dataset.del); save(); renderPerso(); }; });
  document.getElementById('plus-add').onclick = ()=>{
    const cat = document.getElementById('plus-cat').value;
    const montant = parseNum(document.getElementById('plus-montant').value);
    const note = document.getElementById('plus-note').value.trim();
    if(!cat || !montant) return;
    pm.expenses.push({id:uid(), category:cat, montant, note, fixe:false});
    save(); renderPerso();
  };
  const plusChips = document.getElementById('plus-cat-chips');
  plusChips.innerHTML = plusCats.map(c=>`<span class="cat-chip">
      <input type="text" data-renameplus="${c.name}" value="${c.name}">
      ${c.cap!=null?`<input type="text" inputmode="decimal" data-capfield="${c.name}" value="${c.cap}">€`:''}
      <button data-plusdel="${c.name}">✕</button>
    </span>`).join('');
  plusChips.querySelectorAll('[data-renameplus]').forEach(inp=>{
    inp.onchange = (e)=>{
      const cat = state.perso.categories.find(x=>x.name===e.target.dataset.renameplus);
      const newName = e.target.value.trim();
      if(newName && newName!==cat.name){ renamePersoCategoryEverywhere(cat.name, newName); cat.name = newName; save(); renderPerso(); }
    };
  });
  plusChips.querySelectorAll('[data-capfield]').forEach(inp=>{ inp.onchange = (e)=>{ state.perso.categories.find(c=>c.name===e.target.dataset.capfield).cap = parseNum(e.target.value); save(); renderPerso(); }; });
  plusChips.querySelectorAll('[data-plusdel]').forEach(btn=>{ btn.onclick = ()=>{ deletePersoCategoryEverywhere(btn.dataset.plusdel); state.perso.categories = state.perso.categories.filter(c=>c.name!==btn.dataset.plusdel); save(); renderPerso(); }; });
  document.getElementById('plus-cat-add').onclick = ()=>{
    const inp = document.getElementById('plus-cat-new'); const val = inp.value.trim();
    const cap = document.getElementById('plus-cat-cap').value ? parseNum(document.getElementById('plus-cat-cap').value) : null;
    if(val && !state.perso.categories.some(c=>c.name===val)){ state.perso.categories.push({name:val, type:'plus', cap}); save(); renderPerso(); }
  };

  wireYearMonthPicker('perso-yprev','perso-ynext','perso-prev','perso-next', renderPerso);
  wireVueToggle(renderPerso);
  drawPersoChart();
  drawPersoCatChart();
}
function drawPersoChart(){
  const ctx = document.getElementById('chart-perso');
  if(!ctx) return;
  const year = state.currentYear;
  const restes = Array.from({length:12},(_,m)=>persoMonthTotals(year,m).reste);
  if(persoChart) persoChart.destroy();
  persoChart = new Chart(ctx, { type:'bar',
    data:{ labels: MONTHS.map(mo=>mo.slice(0,3)), datasets:[{ data:restes, backgroundColor:restes.map(v=>v>=0?themeAccent()+'cc':'#f97066cc'), borderRadius:4 }] },
    options:{ responsive:true, maintainAspectRatio:false, plugins:{legend:{display:false}},
      scales:{ x:{ticks:{color:'#8a919c',font:{size:9}},grid:{display:false}}, y:{ticks:{color:'#8a919c',font:{size:9}},grid:{color:'#262b33'}} } }
  });
}
function drawPersoCatChart(){
  const ctx = document.getElementById('chart-perso-cat');
  if(!ctx) return;
  const totals = persoCategoryBreakdown();
  const entries = Object.entries(totals).filter(([,v])=>v>0).sort((a,b)=>b[1]-a[1]);
  const palette = ['#f97066','#5b8def','#f5c451','#c084fc','#34d399','#4dd0e1','#a3e635','#fb923c','#f472b6','#818cf8','#e879f9','#facc15'];
  if(persoCatChart) persoCatChart.destroy();
  if(entries.length===0) return;
  persoCatChart = new Chart(ctx, { type:'doughnut',
    data:{ labels: entries.map(e=>e[0]), datasets:[{ data: entries.map(e=>e[1]), backgroundColor: palette, borderColor:'#14171c', borderWidth:2 }] },
    options:{ responsive:true, maintainAspectRatio:false, plugins:{legend:{position:'bottom',labels:{color:'#8a919c',boxWidth:10,font:{size:10},padding:8}}} }
  });
}

// ================= RÉCAP TAB =================
let recapCharts = {};
function renderRecap(){
  const year = state.currentYear, m = state.currentMonth;
  const patrimoineActuel = placementTotal(REAL_YEAR,REAL_MONTH);
  const patrimoinePrevYear = placementTotal(REAL_YEAR-1,REAL_MONTH);
  const pct2 = state.objectif>0 ? (patrimoineActuel/state.objectif*100) : 0;
  const pv = plusValueMonth(year,m);
  const ventesP = totalVentesPeriod(), depensesP = totalDepensesPeriod(), benefP = totalBenefPeriod();
  const persoTotals = persoTotalsPeriod();
  const revenuTotal = persoTotals.revenu;
  const avgPairs = periodPairs();
  const avgMonths = avgPairs.length;
  const bizAverages = allBizIds().map(id=>({
    id, label: state.businesses[id].label,
    avg: avgPairs.reduce((s,p)=>s+bizBenefMonth(id,p.year,p.month),0)/avgMonths
  }));
  const avgTotal = avgPairs.reduce((s,p)=>s+persoMonthTotals(p.year,p.month).revenu,0)/avgMonths;
  const showYearlyCharts = state.vue==='debut';
  const yearMaxMChart = year===REAL_YEAR ? REAL_MONTH : 11;
  const avgBenefTotal = showYearlyCharts
    ? avgPairs.reduce((s,p)=>s+totalBenefMonth(p.year,p.month),0)/avgMonths
    : allBizIds().reduce((s,id)=>s+Array.from({length:yearMaxMChart+1},(_,i)=>bizBenefMonth(id,year,i)).reduce((a,b)=>a+b,0)/(yearMaxMChart+1),0);
  const prevYearBenefP = state.vue==='mois' ? totalBenefMonth(year-1,m)
    : state.vue==='trimestre' ? quarterMonths(quarterOfMonth(m)).reduce((s,mm)=>s+totalBenefMonth(year-1,mm),0)
    : state.vue==='annee' ? Array.from({length:12},(_,mm)=>totalBenefMonth(year-1,mm)).reduce((a,b)=>a+b,0)
    : 0;
  const yearMaxMRecap = year===REAL_YEAR ? REAL_MONTH : 11;
  const patrimoineDebutAnnee = placementTotal(year, 0);
  const patrimoineFinPeriode = placementTotal(year, yearMaxMRecap);
  const firstDataYear = allDataYears()[0];
  const croissanceAnnee = showYearlyCharts
    ? patrimoineFinPeriode - placementTotal(firstDataYear, 0)
    : patrimoineFinPeriode - patrimoineDebutAnnee;
  const avgResteYearRecap = showYearlyCharts
    ? avgPairs.reduce((s,p)=>s+persoMonthTotals(p.year,p.month).reste,0)/avgMonths

  const el = document.getElementById('tab-recap');

      <div class="row" style="margin-top:10px;">
        <div class="mini-label">Objectif <input class="cell txt" style="display:inline;width:90px;" type="text" inputmode="decimal" id="recap-objectif" value="${state.objectif}"></div>
        <div class="mini-value num">${pct2.toFixed(1)}%</div>
      </div>
    </div>

    <div class="card" id="recap-cmd-card" style="cursor:pointer;background:${commandCountColor(state.commandes.filter(c=>!c.archived).length).bg};border-color:${commandCountColor(state.commandes.filter(c=>!c.archived).length).bg};text-align:center;">
      <div class="mini-label" style="color:${commandCountColor(state.commandes.filter(c=>!c.archived).length).fg};">Commandes à traiter — voir →</div>
      <div class="big" style="color:${commandCountColor(state.commandes.filter(c=>!c.archived).length).fg};">${state.commandes.filter(c=>!c.archived).length}</div>
    </div>

    ${yearPickerHTML('recap-yprev','recap-ynext')}
    ${monthPickerHTML('recap-prev','recap-next')}
    ${vueToggleHTML()}

    <div class="grid3">
      <div class="card" style="padding:12px;"><div class="mini-label">CA — ${periodLabel()}</div><div class="mini-value num" style="color:var(--accent)">${fmt(ventesP)}</div></div>
      <div class="card" style="padding:12px;"><div class="mini-label">Dépenses — ${periodLabel()}</div><div class="mini-value num" style="color:var(--danger)">${fmt(depensesP)}</div></div>
      <div class="card" style="padding:12px;"><div class="mini-label">Bénéfice — ${periodLabel()}</div><div class="mini-value num">${fmt(benefP)}</div>${state.vue!=='debut'?yoyPill(benefP,prevYearBenefP):''}</div>
    </div>

    <div class="card">
      <div class="card-title">Revenu ${periodLabel()}</div>
      <div class="big num" style="color:var(--accent)">${fmt(revenuTotal)}</div>
      <table class="subtle-table" style="margin-top:8px;">
        <tr><td>Bénéfice business</td><td class="num">${fmt(benefP)}</td></tr>
        ${state.vue==='mois' ? `<tr><td>Plus-value patrimoine</td><td class="num" style="color:${pv>=0?'var(--accent)':'var(--danger)'}">${pv>=0?'+':''}${fmt(pv)}</td></tr>` : ''}
        <tr><td>À mettre de côté / à placer</td><td class="num">${fmt(persoTotals.reste)}</td></tr>
      </table>
    </div>

    <div class="card">
      <div class="card-title">Revenu moyen / mois — ${periodLabel()}</div>
      <table class="subtle-table">
        ${bizAverages.map(b=>`<tr><td>${b.label}</td><td class="num">${fmt(b.avg)}</td></tr>`).join('')}
        <tr><td><b>Total (avec patrimoine)</b></td><td class="num"><b>${fmt(avgTotal)}</b></td></tr>
      </table>
    </div>

    <div class="grid2">
      ${activeBizIds().map(bizId=>`
      <div class="card">
        <div class="biz-header"><span class="dot" style="background:${state.businesses[bizId].color}"></span><b>${state.businesses[bizId].label}</b></div>
        <div class="mini-label" style="margin-top:6px;">CA — ${periodLabel()}</div>
        <div class="mini-value num">${fmt(bizVentesPeriod(bizId))}</div>
        <div class="mini-label" style="margin-top:6px;">Bénéfice — ${periodLabel()}</div>
        <div class="mini-value num">${fmt(bizBenefPeriod(bizId))}</div>
      </div>`).join('')}
    </div>

    <div class="card">
      <div class="card-title">Composition du patrimoine</div>
      <div class="chart-wrap"><canvas id="chart-patrimoine"></canvas></div>
      <table class="subtle-table" id="patrimoine-table" style="margin-top:8px;"></table>
    </div>

    <div class="card">
      <div class="card-title">Évolution du patrimoine — ${showYearlyCharts?'Depuis le début':year} <span class="pill ${croissanceAnnee>=0?'pos':'neg'}">${croissanceAnnee>=0?'+':''}${fmt(croissanceAnnee)}</span></div>
      <div class="chart-wrap"><canvas id="chart-evolution"></canvas></div>
    </div>

    <div class="card">
      <div class="card-title">Bénéfice business par mois — ${showYearlyCharts?'Depuis le début':year} <span class="pill pos">Moy. ${fmt(avgBenefTotal)}/mois</span></div>
      <div class="chart-wrap"><canvas id="chart-benef-mois"></canvas></div>
    </div>

    <div class="card">
      <div class="card-title">À mettre de côté / mois (perso) — ${showYearlyCharts?'Depuis le début':year} <span class="pill pos">Moy. ${fmt(avgResteYearRecap)}/mois</span></div>
      <div class="chart-wrap"><canvas id="chart-reste-mois"></canvas></div>

    <details style="margin-bottom:12px;"><summary>Personnalisation</summary>

    <div class="card">

        <div class="row" style="margin-bottom:8px;">
          <input class="cell txt" data-bizrename="${bizId}" value="${state.businesses[bizId].label}" style="flex:1;">

        ${allBizIds().filter(id=>state.businesses[id].archived).map(bizId=>`
          <div class="row" style="margin-bottom:6px;">
            <span class="mini-label">${state.businesses[bizId].label}</span>
            <button class="ship-btn" data-bizrestore="${bizId}">Restaurer</button>
          </div>
        `).join('')}
      ` : ''}
    </div>
  `;

  wireYearMonthPicker('recap-yprev','recap-ynext','recap-prev','recap-next', renderRecap);
  document.getElementById('recap-cmd-card').onclick = ()=> switchTab('commandes');

  document.getElementById('theme-accent-picker').onchange = (e)=>{
    state.theme.accent = e.target.value; save(); applyTheme(); renderRecap();
  };
  document.querySelectorAll('[data-bizrename]').forEach(inp=>{
    inp.onchange = (e)=>{
      const id = e.target.dataset.bizrename;
      const val = e.target.value.trim();
      if(val){ state.businesses[id].label = val; save(); buildNav(); renderRecap(); }
    };
  });
  document.querySelectorAll('[data-bizarchive]').forEach(btn=>{
    btn.onclick = ()=>{ state.businesses[btn.dataset.bizarchive].archived = true; save(); buildNav(); renderRecap(); };
  });
  document.querySelectorAll('[data-bizrestore]').forEach(btn=>{
    btn.onclick = ()=>{ state.businesses[btn.dataset.bizrestore].archived = false; save(); buildNav(); renderRecap(); };
  });
  document.getElementById('add-biz-btn').onclick = ()=>{
    const inp = document.getElementById('new-biz-name');
    const name = inp.value.trim();
    if(!name) return;
    const id = 'biz_'+uid();
    state.businesses[id] = defaultBiz(name, '#5b8def', ['Général']);
    save(); buildNav(); renderRecap();
  };
  wireVueToggle(renderRecap);
  document.getElementById('recap-objectif').onchange = (e)=>{
    state.objectif = parseNum(e.target.value); save(); renderRecap();
  };

  const ctx1 = document.getElementById('chart-patrimoine');
  const month = ensurePlacementMonth(REAL_YEAR,REAL_MONTH);
  const lines = state.placement.lines.filter(l=>getLineValue(l, month.snapshots[l.id])>0);
  const palette = ['#34d399','#5b8def','#f5c451','#c084fc','#f97066','#4dd0e1','#a3e635','#fb923c'];
  if(recapCharts.patrimoine) recapCharts.patrimoine.destroy();
  if(lines.length>0){
    recapCharts.patrimoine = new Chart(ctx1,{ type:'doughnut',
      data:{labels:lines.map(l=>l.name), datasets:[{data:lines.map(l=>getLineValue(l, month.snapshots[l.id])), backgroundColor:palette, borderColor:'#14171c', borderWidth:2}]},
      options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'bottom',labels:{color:'#8a919c',boxWidth:10,font:{size:10},padding:8}}}}
    });
  }
  const totalPatr = lines.reduce((s,l)=>s+getLineValue(l, month.snapshots[l.id]),0);
  document.getElementById('patrimoine-table').innerHTML = lines.map(l=>{
    const val = getLineValue(l, month.snapshots[l.id]);
    const p = totalPatr>0 ? val/totalPatr*100 : 0;
    return `<tr><td>${l.name}</td><td class="num">${p.toFixed(1)}%</td><td class="num">${fmt(val)}</td></tr>`;
  }).join('') || `<tr><td class="empty">Aucune donnée</td></tr>`;

  const showYearly = state.vue==='debut';
  const chartYears = allDataYears();
  const chartLabels = showYearly ? chartYears.map(String) : MONTHS.map(mo=>mo.slice(0,3));
  function yearlySum(fn){
    return chartYears.map(y=>{
      const maxM = y===REAL_YEAR ? REAL_MONTH : 11;
      let s=0; for(let mm=0;mm<=maxM;mm++) s+=fn(y,mm);
      return s;
    });
  }

  const ctx2 = document.getElementById('chart-evolution');
  const evo = showYearly
    ? chartYears.map(y=>placementTotal(y, y===REAL_YEAR?REAL_MONTH:11))
    : Array.from({length:12},(_,i)=> (year<REAL_YEAR || (year===REAL_YEAR && i<=REAL_MONTH)) ? placementTotal(year,i) : null);
  if(recapCharts.evolution) recapCharts.evolution.destroy();
  recapCharts.evolution = new Chart(ctx2,{ type:'line',
    data:{ labels: chartLabels, datasets:[{ data:evo, borderColor:themeAccent(), backgroundColor:hexToRgba(themeAccent(),0.2), fill:true, tension:0.3, pointRadius:3, spanGaps:false }] },
    options:{ responsive:true,maintainAspectRatio:false, plugins:{legend:{display:false}},
      scales:{ x:{ticks:{color:'#8a919c',font:{size:9}},grid:{display:false}}, y:{ticks:{color:'#8a919c',font:{size:9}},grid:{color:'#262b33'}} } }
  });

  const ctx3 = document.getElementById('chart-benef-mois');
  if(recapCharts.benef) recapCharts.benef.destroy();
  recapCharts.benef = new Chart(ctx3,{ type:'bar',
    data:{ labels: chartLabels, datasets: activeBizIds().map(bizId=>({
      label: state.businesses[bizId].label,
      data: showYearly ? yearlySum((y,mm)=>bizBenefMonth(bizId,y,mm)) : Array.from({length:12},(_,i)=>bizBenefMonth(bizId,year,i)),
      backgroundColor: state.businesses[bizId].color+'cc',
      borderRadius:4
    })) },
    options:{ responsive:true,maintainAspectRatio:false, plugins:{legend:{labels:{color:'#8a919c',boxWidth:10,font:{size:10}}}},
      scales:{ x:{stacked:true,ticks:{color:'#8a919c',font:{size:9}},grid:{display:false}}, y:{stacked:true,ticks:{color:'#8a919c',font:{size:9}},grid:{color:'#262b33'}} } }
  });

  const ctx4 = document.getElementById('chart-reste-mois');
  const restes = showYearly ? yearlySum((y,mm)=>persoMonthTotals(y,mm).reste) : Array.from({length:12},(_,i)=>persoMonthTotals(year,i).reste);
  if(recapCharts.reste) recapCharts.reste.destroy();
  recapCharts.reste = new Chart(ctx4,{ type:'line',
    data:{ labels: chartLabels, datasets:[{ data:restes, borderColor:themeAccent(), backgroundColor:hexToRgba(themeAccent(),0.2), fill:true, tension:0.3, pointRadius:3 }] },
    options:{ responsive:true,maintainAspectRatio:false, plugins:{legend:{display:false}},
      scales:{ x:{ticks:{color:'#8a919c',font:{size:9}},grid:{display:false}}, y:{ticks:{color:'#8a919c',font:{size:9}},grid:{color:'#262b33'}} } }
  });
}

// ---------- init ----------
function renderAll(){ applyTheme(); buildNav(); renderRecap(); switchTab('recap'); }
renderAll();
</script>
</body>
</html>
